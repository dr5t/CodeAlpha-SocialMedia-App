<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vibe Social — Share your moments with the world">
  <title>Vibe Social — Login</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <div class="auth-page" id="auth-page">
    <div class="auth-wrapper">
      
      <div class="auth-card" id="login-card">
        <div class="auth-logo-container">
          <img src="/images/logo.png" alt="Vibe Logo" class="auth-logo-img">
        </div>
        <form class="auth-form" id="login-form">
          <div class="auth-input-wrapper">
            <input type="text" class="auth-input" id="login-username" placeholder="Username or email" autocomplete="username" required>
          </div>
          <div class="auth-input-wrapper password-input-wrapper">
            <input type="password" class="auth-input" id="login-password" placeholder="Password" autocomplete="current-password" required>
            <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
              <svg class="eye-icon-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-icon-hide" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <button type="submit" class="auth-btn" id="login-btn">Log In</button>
          <div class="auth-divider"><span>OR</span></div>
          <p class="auth-error" id="login-error"></p>
        </form>
      </div>
      <div class="auth-switch-card" id="login-switch">
        Don't have an account? <a href="#" id="show-register">Sign up</a>
      </div>

      
      <div class="auth-card" id="register-card" style="display:none;">
        <div class="auth-logo-container">
          <img src="/images/logo.png" alt="Vibe Logo" class="auth-logo-img">
        </div>
        <p class="auth-subtitle">Sign up to see photos and videos from your friends.</p>
        <form class="auth-form" id="register-form">
          <div class="auth-input-wrapper">
            <input type="email" class="auth-input" id="register-email" placeholder="Email" autocomplete="email" required>
          </div>
          <div class="auth-input-wrapper">
            <input type="text" class="auth-input" id="register-name" placeholder="Full Name" autocomplete="name" required>
          </div>
          <div class="auth-input-wrapper">
            <input type="text" class="auth-input" id="register-username" placeholder="Username" autocomplete="username" required>
          </div>
          <div class="auth-input-wrapper password-input-wrapper">
            <input type="password" class="auth-input" id="register-password" placeholder="Password" autocomplete="new-password" required>
            <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
              <svg class="eye-icon-show" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              <svg class="eye-icon-hide" style="display:none;" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
            </button>
          </div>
          <button type="submit" class="auth-btn" id="register-btn">Sign up</button>
          <p class="auth-error" id="register-error"></p>
        </form>
      </div>
      <div class="auth-switch-card" id="register-switch" style="display:none;">
        Have an account? <a href="#" id="show-login">Log in</a>
      </div>
    </div>
  </div>

  <script src="/js/auth.js"></script>
</body>
</html>
