<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vibe Social — Your feed">
  <title>Vibe Social — Feed</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Top Header -->
  <header class="top-header" id="top-header">
    <div class="top-header__inner">
      <a class="top-header__logo" href="/feed" id="nav-logo"><img src="/images/logo.png" alt="Vibe Logo"></a>

      <div class="top-header__search" id="search-container">
        <span class="top-header__search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" placeholder="Search" id="search-input" autocomplete="off">
        <div class="search-results" id="search-results"></div>
      </div>

      <nav class="top-header__actions">
        <a href="/feed" title="Home" class="desktop-only">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <a href="/explore" title="Explore" class="desktop-only">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        </a>
        <button type="button" title="Create Post" id="create-post-btn" class="desktop-only">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>
        <a href="#" title="Profile" id="nav-profile-link">
          <img src="/images/default-avatar.svg" alt="Profile" class="nav-avatar" id="nav-avatar">
        </a>
        <button type="button" title="Log out" id="logout-btn" class="desktop-only" style="font-size:13px;font-weight:600;color:var(--accent);">
          Log out
        </button>
      </nav>
    </div>
  </header>

  <!-- Bottom Mobile Nav -->
  <nav class="bottom-nav" id="bottom-nav">
    <div class="bottom-nav__inner">
      <a href="/feed" class="bottom-nav__item active" title="Home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" stroke="none"><path d="M22 23h-6.001a1 1 0 0 1-1-1v-5.455a2.997 2.997 0 1 0-5.993 0V22a1 1 0 0 1-1 1H2a1 1 0 0 1-1-1V11.543a1.002 1.002 0 0 1 .31-.724l10-9.543a1.001 1.001 0 0 1 1.38 0l10 9.543a1.002 1.002 0 0 1 .31.724V22a1 1 0 0 1-1 1Z"/></svg>
      </a>
      <a href="/explore" class="bottom-nav__item" title="Explore">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      </a>
      <button type="button" class="bottom-nav__item" title="Create" id="create-post-btn-mobile">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </button>
      <a href="#" class="bottom-nav__item" title="Profile" id="mobile-profile-link">
        <img src="/images/default-avatar.svg" alt="Profile" class="nav-avatar" id="mobile-nav-avatar">
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="page-content">
    <div class="feed-layout">
      <!-- Feed Column -->
      <div class="feed-main" id="feed-main">
        <!-- Stories Bar -->
        <div class="stories-bar" id="stories-bar"></div>

        <!-- Posts will be rendered here -->
        <div id="feed-posts"></div>

        <!-- Loading spinner -->
        <div class="loader" id="feed-loader" style="display:none;">
          <div class="spinner"></div>
        </div>

        <!-- Empty state -->
        <div class="empty-state" id="feed-empty" style="display:none;">
          <span class="empty-state__icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg></span>
          <h2 class="empty-state__title">Welcome to Vibe</h2>
          <p class="empty-state__text">Follow people to start seeing their photos here.</p>
          <a href="/explore" class="btn btn-primary">Explore</a>
        </div>
      </div>

      <!-- Sidebar (Desktop) -->
      <aside class="feed-sidebar" id="feed-sidebar">
        <div class="sidebar-profile" id="sidebar-profile"></div>
        <div class="sidebar-section-header">
          <h4>Suggested for you</h4>
          <a href="/explore">See All</a>
        </div>
        <div id="sidebar-suggestions"></div>
        <div class="sidebar-footer">
          About · Help · Press · API · Jobs · Privacy · Terms · Locations<br>
          © 2026 VIBE SOCIAL
        </div>
      </aside>
    </div>
  </main>

  <!-- Create Post Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <div class="modal__header">
        <button class="modal__close" id="create-modal-close">×</button>
        <span>Create new post</span>
        <button class="modal__share-btn" id="share-post-btn" disabled>Share</button>
      </div>
      <div class="modal__body">
        <div class="upload-area" id="upload-area">
          <span class="upload-icon"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg></span>
          <p class="upload-text">Drag photos here</p>
          <button type="button" class="upload-btn-inline" id="select-file-btn">Select from computer</button>
        </div>
        <input type="file" id="file-input" accept="image/*" hidden>
        <textarea class="caption-input" id="caption-input" placeholder="Write a caption..." style="display:none;"></textarea>
      </div>
    </div>
  </div>

  <!-- Toast Container -->
  <div class="toast-container" id="toast-container"></div>

  <!-- Story Viewer Modal -->
  <div class="story-viewer" id="story-viewer">
    <button class="story-viewer__close" id="story-close-btn">&times;</button>
    <div class="story-viewer__content">
      <div class="story-viewer__progress-container">
        <div class="story-viewer__progress-bar">
          <div class="story-viewer__progress-fill" id="story-progress-fill"></div>
        </div>
      </div>
      <div class="story-viewer__header">
        <img src="" alt="" class="story-viewer__avatar" id="story-avatar">
        <span class="story-viewer__username" id="story-username"></span>
        <span class="story-viewer__time">2h</span>
      </div>
      <img src="" alt="Story" class="story-viewer__image" id="story-image">
    </div>
  </div>

  <script src="/js/app.js"></script>
  <script src="/js/feed.js"></script>
</body>
</html>
