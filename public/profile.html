<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Vibe Social — Profile">
  <title>Vibe Social — Profile</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <!-- Top Header -->
  <header class="top-header" id="top-header">
    <div class="top-header__inner">
      <a class="top-header__logo" href="/feed" id="nav-logo">Vibe</a>
      <div class="top-header__search" id="search-container">
        <span class="top-header__search-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </span>
        <input type="text" placeholder="Search" id="search-input" autocomplete="off">
        <div class="search-results" id="search-results"></div>
      </div>
      <nav class="top-header__actions">
        <a href="/feed" title="Home" class="desktop-only">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        </a>
        <a href="/explore" title="Explore" class="desktop-only">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
        </a>
        <button type="button" title="Create Post" id="create-post-btn" class="desktop-only">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
        </button>
        <a href="#" title="Profile" id="nav-profile-link">
          <img src="/images/default-avatar.svg" alt="Profile" class="nav-avatar" id="nav-avatar">
        </a>
        <button type="button" title="Log out" id="logout-btn" class="desktop-only" style="font-size:13px;font-weight:600;color:var(--accent);">Log out</button>
      </nav>
    </div>
  </header>

  <!-- Bottom Mobile Nav -->
  <nav class="bottom-nav" id="bottom-nav">
    <div class="bottom-nav__inner">
      <a href="/feed" class="bottom-nav__item" title="Home">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      </a>
      <a href="/explore" class="bottom-nav__item" title="Explore">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polygon points="16.24 7.76 14.12 14.12 7.76 16.24 9.88 9.88 16.24 7.76"/></svg>
      </a>
      <button type="button" class="bottom-nav__item" title="Create" id="create-post-btn-mobile">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      </button>
      <a href="#" class="bottom-nav__item" title="Profile" id="mobile-profile-link">
        <img src="/images/default-avatar.svg" alt="Profile" class="nav-avatar" id="mobile-nav-avatar">
      </a>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="page-content">
    <!-- Profile Header -->
    <div class="profile-header" id="profile-header">
      <div class="profile-avatar-wrapper">
        <img src="/images/default-avatar.svg" alt="" class="profile-avatar" id="profile-avatar">
      </div>
      <div class="profile-info">
        <div class="profile-top-row">
          <h1 class="profile-username" id="profile-username"></h1>
          <div class="profile-actions" id="profile-actions"></div>
        </div>
        <div class="profile-stats" id="profile-stats">
          <div class="profile-stat"><strong id="stat-posts">0</strong> posts</div>
          <div class="profile-stat" style="cursor:pointer" id="stat-followers-btn"><strong id="stat-followers">0</strong> followers</div>
          <div class="profile-stat" style="cursor:pointer" id="stat-following-btn"><strong id="stat-following">0</strong> following</div>
        </div>
        <div class="profile-bio">
          <div class="profile-bio__name" id="profile-display-name"></div>
          <div class="profile-bio__text" id="profile-bio-text"></div>
        </div>
      </div>
    </div>

    <!-- Tabs -->
    <div class="profile-tabs">
      <button class="profile-tab active" id="tab-posts">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
        Posts
      </button>
    </div>

    <!-- Post Grid -->
    <div class="profile-grid" id="profile-grid"></div>

    <div class="loader" id="profile-loader" style="display:none;">
      <div class="spinner"></div>
    </div>

    <div class="empty-state" id="profile-empty" style="display:none;">
      <span class="empty-state__icon">📷</span>
      <h2 class="empty-state__title">No Posts Yet</h2>
      <p class="empty-state__text">When you share photos, they will appear on your profile.</p>
    </div>
  </main>

  <!-- Edit Profile Modal -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal">
      <div class="modal__header">
        <button class="modal__close" id="edit-modal-close">×</button>
        <span>Edit profile</span>
        <button class="modal__share-btn" id="save-profile-btn">Done</button>
      </div>
      <div class="modal__body">
        <form class="edit-profile-form" id="edit-profile-form">
          <div>
            <label for="edit-display-name">Name</label>
            <input type="text" id="edit-display-name" placeholder="Display name">
          </div>
          <div>
            <label for="edit-bio">Bio</label>
            <textarea id="edit-bio" placeholder="Tell people about yourself..."></textarea>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Followers/Following Modal -->
  <div class="modal-overlay" id="follow-list-modal">
    <div class="modal">
      <div class="modal__header">
        <button class="modal__close" id="follow-list-close">×</button>
        <span id="follow-list-title">Followers</span>
        <span></span>
      </div>
      <div class="modal__body" style="padding:0;">
        <div class="follow-list" id="follow-list"></div>
      </div>
    </div>
  </div>

  <!-- Create Post Modal -->
  <div class="modal-overlay" id="create-modal">
    <div class="modal">
      <div class="modal__header">
        <button class="modal__close" id="create-modal-close">×</button>
        <span>Create new post</span>
        <button class="modal__share-btn" id="share-post-btn" disabled>Share</button>
      </div>
      <div class="modal__body">
        <div class="upload-area" id="upload-area">
          <span class="upload-icon">📷</span>
          <p class="upload-text">Drag photos here</p>
          <button type="button" class="upload-btn-inline" id="select-file-btn">Select from computer</button>
        </div>
        <input type="file" id="file-input" accept="image/*" hidden>
        <textarea class="caption-input" id="caption-input" placeholder="Write a caption..." style="display:none;"></textarea>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
  <script src="/js/profile.js"></script>
</body>
</html>
